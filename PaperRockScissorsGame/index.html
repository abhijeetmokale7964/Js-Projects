<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors Game</title>
    <link rel="stylesheet" href="../PaperRockScissorsGame/style.css">
    
</head>
<body>
    <h1>Rock Paper Scissors</h1>

<!-- <div class="round-container">
  <h2>Round: <span id="round">1</span> / 10</h2>
</div> -->

    <div class="choises">
        <div class="choice" id="rock">
            <img src="../PaperRockScissorsGame/images/rock.png" >
        </div>
          <div class="choice" id="paper">
            <img src="../PaperRockScissorsGame/images/paper.png" >
        </div>
          <div class="choice" id="scissors">
            <img src="../PaperRockScissorsGame/images/scissors.png" >
        </div>
</div>


<div class="score-board">
<div class="score">
    <p id="user-score">0</p>
    <p>You</p>
</div>

<div class="score">
    <p id="comp-score">0</p>
    <p >comp</p>
</div>
</div>

<div class="msg-container">
    <p id="msg">Play Your Move</p>
     <button id="play-again">Play Again</button>
</div>





    <script src="app.js"></script>
</body>
</html>
